name: Verify Solution
on: [push]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          
      - name: Run Public Tests
        run: |
          # Tests automatically skip if SUBMIT = False in solution.py.
          # Exit code 5 means "No tests were collected", which is expected if all are skipped.
          PYTHONPATH=. pytest tests/ || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 5 ]; then
              echo "All tests were skipped (SUBMIT=False). This is acceptable."
              exit 0
            else
              exit $EXIT_CODE
            fi
          }
