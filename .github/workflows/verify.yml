name: Verify Solution
on: [push]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Run Self-Tests
        run: |
          # Find all solution.py files and run them if SUBMIT = True
          FOUND_ANY=false
          while read -r sol; do
            if grep -q "SUBMIT = True" "$sol"; then
              echo "✅ Verifying: $sol"
              python "$sol"
              FOUND_ANY=true
            else
              echo "⏭️ Skipping (SUBMIT=False): $sol"
            fi
          done < <(find exercises -name "solution.py")
          
          if [ "$FOUND_ANY" = false ]; then
            echo "No exercises marked for submission (SUBMIT=True) were found."
          fi
